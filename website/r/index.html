<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Someone shared their Boulder</title>
    <meta name="description" content="A rock grown five focused minutes at a time. Made with Boulder." />
    <meta property="og:title" content="Someone shared their Boulder" />
    <meta property="og:description" content="A rock grown five focused minutes at a time. Made with Boulder." />
    <meta property="og:image" content="/og-card.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E🪨%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .share-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 48px 24px;
        text-align: center;
      }
      .share-canvas-wrap {
        position: relative;
        background: radial-gradient(ellipse at center, rgba(255, 107, 107, 0.12), transparent 70%);
        padding: 24px;
        border-radius: 24px;
      }
      .share-canvas-wrap canvas { display: block; max-width: 100%; height: auto; }
      .share-meta {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }
      .share-title {
        margin: 0;
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1.1;
      }
      .share-byline {
        margin: 0;
        max-width: 480px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 15px;
      }
      .share-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 24px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ff6b6b, #c147ff);
        color: white;
        font-weight: 700;
        text-decoration: none;
        font-size: 16px;
        margin-top: 6px;
      }
      .share-cta:hover { transform: translateY(-1px); transition: transform 0.15s ease-out; }
      .share-foot {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.38);
      }
      .share-hint {
        font-size: 12px;
        color: rgba(255, 217, 96, 0.7);
        letter-spacing: 0.03em;
      }
      .share-tooltip {
        position: absolute;
        pointer-events: none;
        background: rgba(20, 12, 36, 0.96);
        color: white;
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 217, 96, 0.4);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        opacity: 0;
        transition: opacity 0.12s ease-out;
        white-space: nowrap;
        z-index: 10;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body class="share-page">
    <div class="share-meta" id="share-meta">Loading rock…</div>
    <h1 class="share-title" id="share-title">Someone grew this rock.</h1>
    <p class="share-byline" id="share-byline">One grain per five minutes of focus. No streaks. No death. Just a rock that grows.</p>
    <div class="share-canvas-wrap">
      <canvas id="share-canvas" width="600" height="420"></canvas>
      <div class="share-tooltip" id="share-tooltip"></div>
    </div>
    <p class="share-hint">Hover or tap any grain to see when it was earned.</p>
    <a class="share-cta" href="/">Grow your own — Boulder is free</a>
    <p class="share-foot">🪨 Made with Boulder · macOS menubar</p>

    <script src="../share-renderer.js"></script>
  </body>
</html>
