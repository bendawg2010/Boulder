<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Someone shared their Boulder</title>
    <meta name="description" content="A rock grown one focus minute at a time. Made with Boulder." />
    <meta property="og:title" content="Someone shared their Boulder" />
    <meta property="og:description" content="A rock grown one focus minute at a time. Made with Boulder." />
    <meta property="og:image" content="/og-card.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E🪨%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .share-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 48px 24px;
        text-align: center;
      }
      .share-canvas-wrap {
        background: radial-gradient(ellipse at center, rgba(255, 107, 107, 0.12), transparent 70%);
        padding: 24px;
        border-radius: 24px;
      }
      .share-canvas-wrap canvas { display: block; max-width: 100%; height: auto; }
      .share-meta {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .share-cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 24px;
        border-radius: 999px;
        background: linear-gradient(90deg, #ff6b6b, #c147ff);
        color: white;
        font-weight: 700;
        text-decoration: none;
        font-size: 16px;
      }
      .share-tag {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body class="share-page">
    <div class="share-meta" id="share-meta">Loading rock…</div>
    <div class="share-canvas-wrap">
      <canvas id="share-canvas" width="600" height="420"></canvas>
    </div>
    <h1 style="margin: 0; font-size: 28px;">Someone grew this rock.</h1>
    <p style="margin: 0; max-width: 480px; color: rgba(255,255,255,0.65);">
      One grain per five minutes of focus. No streaks. No death. Just a rock that grows.
    </p>
    <a class="share-cta" href="/">Grow your own — Boulder is free</a>
    <p class="share-tag">🪨 Made with Boulder · macOS menubar</p>

    <script src="../share-renderer.js"></script>
  </body>
</html>
