name: Boulder
options:
  bundleIdPrefix: com.benburnette
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
    GENERATE_INFOPLIST_FILE: NO
    # SOURCE OF TRUTH — release.sh seds this line, xcodegen
    # regenerates Info.plist with $(MARKETING_VERSION). Do NOT
    # let PlistBuddy touch Info.plist directly; xcodegen wipes it.
    MARKETING_VERSION: "1.4.9"
    CURRENT_PROJECT_VERSION: "14"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"

targets:
  Boulder:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: App/Assets.xcassets
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Boulder
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.productivity
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Free · MIT licensed"
        # ---- Sparkle auto-update keys ----
        # Replace SUPublicEDKey with the public half of the EdDSA
        # keypair generated by scripts/sparkle/bin/generate_keys.
        SUPublicEDKey: "CfYNfRbvojf1x4iugpkQGkwNjJCbM5EqSFeIVgyAnu8="
        SUFeedURL: "https://boulder-43p.pages.dev/appcast.xml"
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 14400
        # Always false — see NotchPop lessons. Silent auto-install
        # strands ad-hoc-signed users on stale versions.
        SUAutomaticallyUpdate: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benburnette.Boulder
        PRODUCT_NAME: Boulder
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Boulder.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        ENABLE_PREVIEWS: YES

  BoulderWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
      - path: App/Features/BoulderRenderer.swift
      - path: App/Features/BoulderShape.swift
      - path: App/Features/BoulderState.swift
      - path: App/Features/BoulderStore.swift
      - path: App/Features/FocusTag.swift
      - path: App/Features/FocusSession.swift
      - path: App/Features/FocusType.swift
      - path: App/Features/BlockedApp.swift
      - path: App/Helpers/Persistence.swift
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: BoulderWidget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.benburnette.Boulder.BoulderWidget
        PRODUCT_NAME: BoulderWidget
        CODE_SIGN_ENTITLEMENTS: Widget/BoulderWidget.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../../../../Frameworks"
          - "@executable_path/../../../Frameworks"
        SWIFT_VERSION: "5.9"
        ENABLE_PREVIEWS: YES
        SKIP_INSTALL: YES
